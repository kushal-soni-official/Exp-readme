<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="100%" preserveAspectRatio="xMidYMid meet">
  <!-- Terminal Window Background -->
  <rect width="900" height="200" fill="#0D1117" rx="6"/>
  <!-- Terminal Window Header -->
  <rect x="0" y="0" width="900" height="30" fill="#161B22" rx="6"/>
  <rect x="0" y="25" width="900" height="5" fill="#161B22"/>
  <line x1="0" y1="30" x2="900" y2="30" stroke="#00BFFF" stroke-width="0.5" opacity="0.3"/>
  
  <!-- macOS window controls -->
  <circle cx="20" cy="15" r="5" fill="#FF5F57"/>
  <circle cx="38" cy="15" r="5" fill="#FEBC2E"/>
  <circle cx="56" cy="15" r="5" fill="#28C840"/>
  
  <!-- Terminal Title -->
  <text x="450" y="20" text-anchor="middle" font-family="Courier New,Courier,monospace" font-size="12" fill="#8B949E" font-weight="bold">root@kushal-server:~</text>

  <g font-family="Courier New,Courier,monospace" font-size="13">
    <!-- Line 1: whoami -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.04;0.06;0.85;0.90;1" dur="15s" repeatCount="indefinite"/>
      <text x="20" y="65">
        <tspan fill="#FF5F57" font-weight="bold">root@kali</tspan>
        <tspan fill="#EAF8FF">:</tspan>
        <tspan fill="#4FC3FF" font-weight="bold">~</tspan>
        <tspan fill="#EAF8FF"># whoami</tspan>
      </text>
      <text x="20" y="85" fill="#EAF8FF">kushal-soni-official</text>
    </g>

    <!-- Line 2: role -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.18;0.20;0.85;0.90;1" dur="15s" repeatCount="indefinite"/>
      <text x="20" y="110">
        <tspan fill="#FF5F57" font-weight="bold">root@kali</tspan>
        <tspan fill="#EAF8FF">:</tspan>
        <tspan fill="#4FC3FF" font-weight="bold">~</tspan>
        <tspan fill="#EAF8FF"># ./get_role.sh</tspan>
      </text>
      <text x="20" y="130" fill="#28C840" font-weight="bold">[+] </text>
      <text x="50" y="130" fill="#EAF8FF">Cybersecurity &amp; AI Engineering Student</text>
    </g>

    <!-- Line 3: speciality -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.32;0.34;0.85;0.90;1" dur="15s" repeatCount="indefinite"/>
      <text x="20" y="155">
        <tspan fill="#FF5F57" font-weight="bold">root@kali</tspan>
        <tspan fill="#EAF8FF">:</tspan>
        <tspan fill="#4FC3FF" font-weight="bold">~</tspan>
        <tspan fill="#EAF8FF"># cat core_skills.txt</tspan>
      </text>
      <text x="20" y="175" fill="#EAF8FF">AI Security | Network Recon | Python | Penetration Testing</text>
    </g>

    <!-- Blinking cursor -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.45;0.47;0.85;0.90;1" dur="15s" repeatCount="indefinite"/>
      <rect x="20" y="180" width="8" height="15" fill="#00ff88">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
