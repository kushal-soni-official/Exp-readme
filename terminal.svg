<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Typewriter 1: whoami -->
    <clipPath id="t1">
      <rect x="0" y="50" width="0" height="20">
        <animate attributeName="width" values="0;0;200;200;0;0" keyTimes="0;0.05;0.10;0.85;0.90;1" dur="15s" repeatCount="indefinite" fill="freeze"/>
      </rect>
    </clipPath>
    <!-- Result 1 -->
    <clipPath id="r1">
      <rect x="0" y="70" width="0" height="20">
        <animate attributeName="width" values="0;0;300;300;0;0" keyTimes="0;0.10;0.11;0.85;0.90;1" dur="15s" repeatCount="indefinite" fill="freeze"/>
      </rect>
    </clipPath>

    <!-- Typewriter 2: role -->
    <clipPath id="t2">
      <rect x="0" y="95" width="0" height="20">
        <animate attributeName="width" values="0;0;200;200;0;0" keyTimes="0;0.20;0.25;0.85;0.90;1" dur="15s" repeatCount="indefinite" fill="freeze"/>
      </rect>
    </clipPath>
    <!-- Result 2 -->
    <clipPath id="r2">
      <rect x="0" y="115" width="0" height="20">
        <animate attributeName="width" values="0;0;600;600;0;0" keyTimes="0;0.25;0.26;0.85;0.90;1" dur="15s" repeatCount="indefinite" fill="freeze"/>
      </rect>
    </clipPath>

    <!-- Typewriter 3: speciality -->
    <clipPath id="t3">
      <rect x="0" y="140" width="0" height="20">
        <animate attributeName="width" values="0;0;250;250;0;0" keyTimes="0;0.35;0.40;0.85;0.90;1" dur="15s" repeatCount="indefinite" fill="freeze"/>
      </rect>
    </clipPath>
    <!-- Result 3 -->
    <clipPath id="r3">
      <rect x="0" y="160" width="0" height="20">
        <animate attributeName="width" values="0;0;600;600;0;0" keyTimes="0;0.40;0.41;0.85;0.90;1" dur="15s" repeatCount="indefinite" fill="freeze"/>
      </rect>
    </clipPath>

    <!-- Typewriter 4: clear -->
    <clipPath id="t4">
      <rect x="0" y="180" width="0" height="20">
        <animate attributeName="width" values="0;0;200;200;0;0" keyTimes="0;0.50;0.55;0.85;0.90;1" dur="15s" repeatCount="indefinite" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="900" height="200" fill="#0D1117" rx="6"/>
  <rect x="0" y="0" width="900" height="30" fill="#161B22" rx="6"/>
  <rect x="0" y="25" width="900" height="5" fill="#161B22"/>
  <line x1="0" y1="30" x2="900" y2="30" stroke="#00BFFF" stroke-width="0.5" opacity="0.3"/>
  
  <circle cx="20" cy="15" r="5" fill="#FF5F57"/>
  <circle cx="38" cy="15" r="5" fill="#FEBC2E"/>
  <circle cx="56" cy="15" r="5" fill="#28C840"/>
  
  <text x="450" y="20" text-anchor="middle" font-family="Courier New,Courier,monospace" font-size="12" fill="#8B949E" font-weight="bold">root@kushal-server:~</text>

  <!-- Group disappears after clear (at 0.60) -->
  <g font-family="Courier New,Courier,monospace" font-size="13">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.58;0.59;0.85;1" dur="15s" repeatCount="indefinite"/>

    <!-- Block 1 -->
    <text x="20" y="65" clip-path="url(#t1)">
      <tspan fill="#FF5F57" font-weight="bold">root@kali</tspan><tspan fill="#EAF8FF">:</tspan><tspan fill="#4FC3FF" font-weight="bold">~</tspan><tspan fill="#EAF8FF"># whoami</tspan>
    </text>
    <text x="20" y="85" fill="#EAF8FF" clip-path="url(#r1)">Kushal Soni</text>

    <!-- Block 2 -->
    <text x="20" y="110" clip-path="url(#t2)">
      <tspan fill="#FF5F57" font-weight="bold">root@kali</tspan><tspan fill="#EAF8FF">:</tspan><tspan fill="#4FC3FF" font-weight="bold">~</tspan><tspan fill="#EAF8FF"># ./get_role.sh</tspan>
    </text>
    <text x="20" y="130" clip-path="url(#r2)"><tspan fill="#28C840" font-weight="bold">[+] </tspan><tspan fill="#EAF8FF">Cybersecurity &amp; AI Engineering Student</tspan></text>

    <!-- Block 3 -->
    <text x="20" y="155" clip-path="url(#t3)">
      <tspan fill="#FF5F57" font-weight="bold">root@kali</tspan><tspan fill="#EAF8FF">:</tspan><tspan fill="#4FC3FF" font-weight="bold">~</tspan><tspan fill="#EAF8FF"># cat core_skills.txt</tspan>
    </text>
    <text x="20" y="175" fill="#EAF8FF" clip-path="url(#r3)">AI Security | Network Recon | Python | Penetration Testing</text>

    <!-- Block 4 -->
    <text x="20" y="195" clip-path="url(#t4)">
      <tspan fill="#FF5F57" font-weight="bold">root@kali</tspan><tspan fill="#EAF8FF">:</tspan><tspan fill="#4FC3FF" font-weight="bold">~</tspan><tspan fill="#EAF8FF"># clear</tspan>
    </text>

    <!-- Cursor jumping per line -->
    <rect width="8" height="15" fill="#00ff88">
      <animate attributeName="x" values="135;135;20;135;135;20;135;135;20;135;135" keyTimes="0;0.10;0.11;0.20;0.25;0.26;0.35;0.40;0.41;0.50;1" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="y" values="53;53;98;98;98;143;143;143;183;183;183" keyTimes="0;0.10;0.11;0.20;0.25;0.26;0.35;0.40;0.41;0.50;1" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1;0" dur="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Post-clear terminal prompt -->
  <g font-family="Courier New,Courier,monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.59;0.60;0.85;1" dur="15s" repeatCount="indefinite"/>
    <text x="20" y="65">
      <tspan fill="#FF5F57" font-weight="bold">root@kali</tspan><tspan fill="#EAF8FF">:</tspan><tspan fill="#4FC3FF" font-weight="bold">~</tspan><tspan fill="#EAF8FF"># </tspan>
    </text>
    <rect x="135" y="53" width="8" height="15" fill="#00ff88">
      <animate attributeName="opacity" values="1;0;1;0" dur="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
