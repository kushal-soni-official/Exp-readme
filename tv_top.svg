<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 100" width="100%" preserveAspectRatio="none">
  <defs>
    <!-- Ambient glow from the screen bleeding onto the dark ceiling -->
    <radialGradient id="screen-glow" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#010103" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <!-- Background ceiling -->
  <rect width="900" height="100" fill="url(#screen-glow)"/>
  
  <!-- Perspective lines on ceiling going UP and AWAY from the screen -->
  <line x1="0" y1="100" x2="-150" y2="0" stroke="#00BFFF" stroke-width="1" opacity="0.2"/>
  <line x1="250" y1="100" x2="150" y2="0" stroke="#00BFFF" stroke-width="1" opacity="0.15"/>
  <line x1="450" y1="100" x2="450" y2="0" stroke="#00BFFF" stroke-width="1" opacity="0.15"/>
  <line x1="650" y1="100" x2="750" y2="0" stroke="#00BFFF" stroke-width="1" opacity="0.15"/>
  <line x1="900" y1="100" x2="1050" y2="0" stroke="#00BFFF" stroke-width="1" opacity="0.2"/>

  <!-- Horizontal architectural lines -->
  <line x1="0" y1="30" x2="900" y2="30" stroke="#00BFFF" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="70" x2="900" y2="70" stroke="#00BFFF" stroke-width="0.5" opacity="0.1"/>

  <!-- Tiny, razor-thin monitor top bezel edge -->
  <rect x="0" y="98" width="900" height="2" fill="#0a0a0f"/>
  <rect x="0" y="99" width="900" height="1" fill="#00BFFF" opacity="0.6"/>
</svg>
