<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 155" width="100%" preserveAspectRatio="xMidYMid meet">

  <!-- Background -->
  <rect width="900" height="155" fill="#050510"/>

  <!-- Outer border glow -->
  <rect x="1" y="1" width="898" height="153" fill="none" stroke="#00BFFF" stroke-width="1">
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Header bar -->
  <rect x="0" y="0" width="900" height="28" fill="#0D1117"/>
  <line x1="0" y1="28" x2="900" y2="28" stroke="#00BFFF" stroke-width="0.5" opacity="0.4"/>
  <text x="14" y="19" font-family="Courier New,Courier,monospace" font-size="12" fill="#00BFFF" font-weight="bold" letter-spacing="1">[ TECHNICAL ARSENAL ]</text>

  <!-- Center divider line (vertical) -->
  <line x1="450" y1="28" x2="450" y2="155" stroke="#00BFFF" stroke-width="0.5" opacity="0.2"/>

  <!-- Horizontal row divider -->
  <line x1="0" y1="91" x2="900" y2="91" stroke="#00BFFF" stroke-width="0.5" opacity="0.15"/>

  <!-- Accent left bar -->
  <rect x="0" y="0" width="2" height="155" fill="#00BFFF" opacity="0.3"/>
  <rect x="898" y="0" width="2" height="155" fill="#00BFFF" opacity="0.3"/>

  <!-- === TOP LEFT: OFFENSIVE SECURITY === -->
  <text x="18" y="48" font-family="Courier New,Courier,monospace" font-size="10" fill="#00BFFF" font-weight="bold" letter-spacing="1.5">&#x25B8; OFFENSIVE SECURITY</text>
  <text x="18" y="64" font-family="Courier New,Courier,monospace" font-size="10" fill="#7FDBFF" opacity="0.8">&#xB7; Kali Linux  &#xB7; Nmap  &#xB7; Wireshark</text>
  <text x="18" y="78" font-family="Courier New,Courier,monospace" font-size="10" fill="#7FDBFF" opacity="0.8">&#xB7; Burp Suite  &#xB7; AES-256  &#xB7; SHA-256</text>

  <!-- === TOP RIGHT: LANGUAGES & CORE === -->
  <text x="466" y="48" font-family="Courier New,Courier,monospace" font-size="10" fill="#00BFFF" font-weight="bold" letter-spacing="1.5">&#x25B8; LANGUAGES &amp; CORE</text>
  <text x="466" y="64" font-family="Courier New,Courier,monospace" font-size="10" fill="#7FDBFF" opacity="0.8">&#xB7; Python  &#xB7; JavaScript  &#xB7; HTML5</text>
  <text x="466" y="78" font-family="Courier New,Courier,monospace" font-size="10" fill="#7FDBFF" opacity="0.8">&#xB7; CSS3  &#xB7; SQL  &#xB7; Bash Scripting</text>

  <!-- === BOTTOM LEFT: AI & ML DEFENSE === -->
  <text x="18" y="110" font-family="Courier New,Courier,monospace" font-size="10" fill="#00BFFF" font-weight="bold" letter-spacing="1.5">&#x25B8; AI &amp; ML DEFENSE</text>
  <text x="18" y="126" font-family="Courier New,Courier,monospace" font-size="10" fill="#7FDBFF" opacity="0.8">&#xB7; PyTorch  &#xB7; scikit-learn  &#xB7; FastAPI</text>
  <text x="18" y="141" font-family="Courier New,Courier,monospace" font-size="10" fill="#7FDBFF" opacity="0.8">&#xB7; Google ADK  &#xB7; Gemini API  &#xB7; Flask</text>

  <!-- === BOTTOM RIGHT: PLATFORMS & DATA === -->
  <text x="466" y="110" font-family="Courier New,Courier,monospace" font-size="10" fill="#00BFFF" font-weight="bold" letter-spacing="1.5">&#x25B8; PLATFORMS &amp; DATA</text>
  <text x="466" y="126" font-family="Courier New,Courier,monospace" font-size="10" fill="#7FDBFF" opacity="0.8">&#xB7; Linux  &#xB7; Power BI  &#xB7; DAX</text>
  <text x="466" y="141" font-family="Courier New,Courier,monospace" font-size="10" fill="#7FDBFF" opacity="0.8">&#xB7; Azure (Learning)  &#xB7; REST APIs  &#xB7; Git</text>

  <!-- Animated pulse dot on center divider -->
  <circle cx="450" cy="91" r="4" fill="#00BFFF">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom status bar -->
  <line x1="0" y1="154" x2="900" y2="154" stroke="#00BFFF" stroke-width="0.5" opacity="0.3"/>

</svg>
