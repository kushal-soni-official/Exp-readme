<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 12" width="100%" preserveAspectRatio="none">
  <defs>
    <linearGradient id="dc_pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00BFFF" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#00BFFF" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#7FDBFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00BFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="12" fill="#050510"/>

  <!-- Base line -->
  <line x1="0" y1="6" x2="900" y2="6" stroke="#00BFFF" stroke-width="0.5" opacity="0.22"/>

  <!-- PCB nodes -->
  <circle cx="75"  cy="6" r="1.8" fill="#00BFFF" opacity="0.38"/>
  <circle cx="225" cy="6" r="1.4" fill="#00BFFF" opacity="0.32"/>
  <circle cx="375" cy="6" r="1.8" fill="#00BFFF" opacity="0.38"/>
  <circle cx="450" cy="6" r="3"   fill="#00BFFF" opacity="0.65"/>
  <circle cx="525" cy="6" r="1.8" fill="#00BFFF" opacity="0.38"/>
  <circle cx="675" cy="6" r="1.4" fill="#00BFFF" opacity="0.32"/>
  <circle cx="825" cy="6" r="1.8" fill="#00BFFF" opacity="0.38"/>

  <!-- Center node branches -->
  <line x1="450" y1="1"  x2="450" y2="11" stroke="#00BFFF" stroke-width="0.5" opacity="0.4"/>
  <line x1="438" y1="2"  x2="462" y2="2"  stroke="#00BFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="438" y1="10" x2="462" y2="10" stroke="#00BFFF" stroke-width="0.5" opacity="0.3"/>

  <!-- Animated energy pulse -->
  <rect x="-130" y="2" width="130" height="8" fill="url(#dc_pulse)" opacity="0.95">
    <animate attributeName="x" values="-130;900" dur="2.4s" repeatCount="indefinite" calcMode="linear"/>
  </rect>
</svg>
