<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 2" width="100%" preserveAspectRatio="none">
  <defs>
    <!-- Laser line gradient using typing effect color #0088FF -->
    <linearGradient id="laser" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="50%" stop-color="#0088FF"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <!-- Subtle pulse overlay, reduced glow and slower -->
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0088FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0088FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0088FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Base thin laser line -->
  <rect width="900" height="1" y="0.5" fill="url(#laser)" opacity="0.5"/>
  <!-- Animated pulse, slowed down to 5s -->
  <rect x="-100" y="0" width="100" height="2" fill="url(#pulse)">
    <animate attributeName="x" values="-100;900" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
