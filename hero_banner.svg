<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="hb_grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00BFFF" stroke-width="0.15" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background + Grid -->
  <rect width="900" height="180" fill="#050510"/>
  <rect width="900" height="180" fill="url(#hb_grid)"/>

  <!-- Outer border glow -->
  <rect x="1" y="1" width="898" height="178" fill="none" stroke="#00BFFF" stroke-width="1">
    <animate attributeName="opacity" values="0.15;0.45;0.15" dur="3.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner accents TL -->
  <line x1="0" y1="0" x2="58" y2="0" stroke="#FF003C" stroke-width="2.5" opacity="0.85"/>
  <line x1="0" y1="0" x2="0" y2="40" stroke="#FF003C" stroke-width="2.5" opacity="0.85"/>
  <!-- TR -->
  <line x1="900" y1="0" x2="842" y2="0" stroke="#FF003C" stroke-width="2.5" opacity="0.85"/>
  <line x1="900" y1="0" x2="900" y2="40" stroke="#FF003C" stroke-width="2.5" opacity="0.85"/>
  <!-- BL -->
  <line x1="0" y1="180" x2="58" y2="180" stroke="#FF003C" stroke-width="2.5" opacity="0.85"/>
  <line x1="0" y1="180" x2="0" y2="140" stroke="#FF003C" stroke-width="2.5" opacity="0.85"/>
  <!-- BR -->
  <line x1="900" y1="180" x2="842" y2="180" stroke="#FF003C" stroke-width="2.5" opacity="0.85"/>
  <line x1="900" y1="180" x2="900" y2="140" stroke="#FF003C" stroke-width="2.5" opacity="0.85"/>

  <!-- Top Status Bar -->
  <rect x="0" y="0" width="900" height="22" fill="#0D1117" opacity="0.88"/>
  <text x="14" y="15" font-family="Courier New,Courier,monospace" font-size="9" fill="#00BFFF" letter-spacing="2">SYSTEM ONLINE</text>
  <circle cx="142" cy="11" r="3.5" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3.5;2;3.5" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="158" y="15" font-family="Courier New,Courier,monospace" font-size="8" fill="#4FC3FF" opacity="0.7">|  KUSHAL-SONI-OFFICIAL  |  CYBERSECURITY &amp; AI PROFILE  |  v2.0</text>

  <!-- Left side circuit traces -->
  <line x1="168" y1="22" x2="168" y2="158" stroke="#00BFFF" stroke-width="0.5" opacity="0.22"/>
  <circle cx="168" cy="56" r="2.5" fill="#00BFFF" opacity="0.45">
    <animate attributeName="opacity" values="0.45;0.9;0.45" dur="3s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <line x1="168" y1="56" x2="192" y2="56" stroke="#00BFFF" stroke-width="0.5" opacity="0.22"/>
  <circle cx="168" cy="90" r="2.5" fill="#00BFFF" opacity="0.45">
    <animate attributeName="opacity" values="0.45;0.9;0.45" dur="3s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <line x1="168" y1="90" x2="186" y2="90" stroke="#00BFFF" stroke-width="0.5" opacity="0.22"/>
  <circle cx="168" cy="124" r="2.5" fill="#00BFFF" opacity="0.45">
    <animate attributeName="opacity" values="0.45;0.9;0.45" dur="3s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <line x1="168" y1="124" x2="180" y2="124" stroke="#00BFFF" stroke-width="0.5" opacity="0.22"/>

  <!-- Left hex codes -->
  <text x="12" y="58"  font-family="Courier New,Courier,monospace" font-size="9.5" fill="#00BFFF" opacity="0.3">0x4B53</text>
  <text x="12" y="80"  font-family="Courier New,Courier,monospace" font-size="9.5" fill="#00BFFF" opacity="0.2">0x01FF</text>
  <text x="12" y="102" font-family="Courier New,Courier,monospace" font-size="9.5" fill="#00BFFF" opacity="0.3">0xA0C3</text>
  <text x="12" y="124" font-family="Courier New,Courier,monospace" font-size="9.5" fill="#00BFFF" opacity="0.2">0xD4E7</text>
  <text x="12" y="146" font-family="Courier New,Courier,monospace" font-size="9.5" fill="#00BFFF" opacity="0.3">0x2B9F</text>

  <!-- Right side circuit traces -->
  <line x1="732" y1="22" x2="732" y2="158" stroke="#00BFFF" stroke-width="0.5" opacity="0.22"/>
  <circle cx="732" cy="56" r="2.5" fill="#00BFFF" opacity="0.45">
    <animate attributeName="opacity" values="0.45;0.9;0.45" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <line x1="732" y1="56" x2="708" y2="56" stroke="#00BFFF" stroke-width="0.5" opacity="0.22"/>
  <circle cx="732" cy="90" r="2.5" fill="#00BFFF" opacity="0.45">
    <animate attributeName="opacity" values="0.45;0.9;0.45" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <line x1="732" y1="90" x2="714" y2="90" stroke="#00BFFF" stroke-width="0.5" opacity="0.22"/>
  <circle cx="732" cy="124" r="2.5" fill="#00BFFF" opacity="0.45">
    <animate attributeName="opacity" values="0.45;0.9;0.45" dur="3s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
  <line x1="732" y1="124" x2="720" y2="124" stroke="#00BFFF" stroke-width="0.5" opacity="0.22"/>

  <!-- Right hex codes -->
  <text x="838" y="58"  font-family="Courier New,Courier,monospace" font-size="9.5" fill="#00BFFF" opacity="0.3">0xE7F3</text>
  <text x="838" y="80"  font-family="Courier New,Courier,monospace" font-size="9.5" fill="#00BFFF" opacity="0.2">0x3CB2</text>
  <text x="838" y="102" font-family="Courier New,Courier,monospace" font-size="9.5" fill="#00BFFF" opacity="0.3">0x9FA4</text>
  <text x="838" y="124" font-family="Courier New,Courier,monospace" font-size="9.5" fill="#00BFFF" opacity="0.2">0xC1D8</text>
  <text x="838" y="146" font-family="Courier New,Courier,monospace" font-size="9.5" fill="#00BFFF" opacity="0.3">0x5E29</text>

  <!-- KUSHAL SONI — glow simulation layers -->
  <text x="450" y="100" text-anchor="middle" font-family="Courier New,Courier,monospace" font-size="56" font-weight="900" fill="#00BFFF" opacity="0.04">KUSHAL SONI</text>
  <text x="447" y="97"  text-anchor="middle" font-family="Courier New,Courier,monospace" font-size="56" font-weight="900" fill="#00BFFF" opacity="0.08">KUSHAL SONI</text>
  <text x="453" y="103" text-anchor="middle" font-family="Courier New,Courier,monospace" font-size="56" font-weight="900" fill="#00BFFF" opacity="0.08">KUSHAL SONI</text>
  <text x="449" y="99"  text-anchor="middle" font-family="Courier New,Courier,monospace" font-size="56" font-weight="900" fill="#7FDBFF" opacity="0.16">KUSHAL SONI</text>
  <text x="451" y="101" text-anchor="middle" font-family="Courier New,Courier,monospace" font-size="56" font-weight="900" fill="#7FDBFF" opacity="0.16">KUSHAL SONI</text>
  <!-- Main -->
  <text x="450" y="100" text-anchor="middle" font-family="Courier New,Courier,monospace" font-size="56" font-weight="900" fill="#EAF8FF">
    KUSHAL SONI
    <animate attributeName="opacity" values="0.92;1;0.96;1;0.92" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="128" text-anchor="middle" font-family="Courier New,Courier,monospace" font-size="11" fill="#4FC3FF" letter-spacing="3.5">
    &#x25C8;  CYBERSECURITY  &amp;  AI  ENGINEER  &#x25C8;
    <animate attributeName="opacity" values="0.6;0.92;0.6" dur="4.5s" repeatCount="indefinite"/>
  </text>

  <!-- Floating particles -->
  <circle cx="215" cy="82" r="1.5" fill="#7FDBFF" opacity="0">
    <animate attributeName="opacity" values="0;0.75;0" dur="3.2s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="cy" values="82;62;42" dur="3.2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="362" cy="118" r="1" fill="#7FDBFF" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite" begin="1.1s"/>
    <animate attributeName="cy" values="118;98;78" dur="4s" repeatCount="indefinite" begin="1.1s"/>
  </circle>
  <circle cx="540" cy="95" r="1.5" fill="#7FDBFF" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="3.6s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="cy" values="95;75;55" dur="3.6s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle cx="690" cy="110" r="1" fill="#7FDBFF" opacity="0">
    <animate attributeName="opacity" values="0;0.55;0" dur="4.4s" repeatCount="indefinite" begin="2.2s"/>
    <animate attributeName="cy" values="110;90;70" dur="4.4s" repeatCount="indefinite" begin="2.2s"/>
  </circle>
  <circle cx="298" cy="76" r="1.2" fill="#7FDBFF" opacity="0">
    <animate attributeName="opacity" values="0;0.65;0" dur="3.8s" repeatCount="indefinite" begin="1.9s"/>
    <animate attributeName="cy" values="76;56;36" dur="3.8s" repeatCount="indefinite" begin="1.9s"/>
  </circle>

  <!-- Bottom Status Bar -->
  <rect x="0" y="158" width="900" height="22" fill="#0D1117" opacity="0.88"/>
  <text x="14" y="173" font-family="Courier New,Courier,monospace" font-size="8.5" fill="#4FC3FF" letter-spacing="0.5" opacity="0.85">[ ETHICAL HACKING ] &#xB7; [ AI SECURITY ] &#xB7; [ NETWORK RECON ] &#xB7; [ ZERO-BUDGET BUILDER ] &#xB7; [ INDIA ]</text>

  <!-- Scanline sweep -->
  <rect x="0" y="-2" width="900" height="2" fill="#00BFFF" opacity="0">
    <animate attributeName="y" values="-2;182;-2" dur="8s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0;0.12;0.12;0" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
